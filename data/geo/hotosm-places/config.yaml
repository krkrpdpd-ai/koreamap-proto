iso3: KOR
category:
  name: populated_places
  formats:
  - gpkg
  - shp
  - geojson
  - kml
  skip_pcodes: false
  boundary_resolution: null
  hdx:
    title: Populated Places
    notes: 'Settlements and residential areas from OSM. Includes named cities, towns,
      villages, suburbs, and residential land (`place=*` and `landuse=residential`).
      Useful for demographic context, settlement-level targeting, and population analysis.


      OpenStreetMap is a free, collaborative world map built by volunteers. Completeness
      varies by region: urban areas are usually well-mapped, remote areas may be incomplete.
      Cross-check critical decisions with local field knowledge.


      - Source: [OpenStreetMap](https://www.openstreetmap.org)

      - OSM tags: [Key:place](https://wiki.openstreetmap.org/wiki/Key:place), [Key:landuse](https://wiki.openstreetmap.org/wiki/Key:landuse)

      - Part of many  [exports grid on HDX](https://data.humdata.org/organization/hot)
      by the [HOT](https://www.hotosm.org/en/)

      '
    tags:
    - geodata
    - populated places-settlements
    license: hdx-odc-odbl
    license_url: https://opendatacommons.org/licenses/odbl/1-0/
    caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive
    dataset_source: OpenStreetMap contributors
  overture:
    enabled: true
    theme: divisions
    feature_type: division
    select:
    - id
    - names.primary AS name
    - names.common->>'en' AS name_en
    - subtype AS place
    - population
    - sources[1].dataset AS source
    - update_time AS update_time
    where:
    - subtype = 'locality'
  osm:
    enabled: true
    select:
    - feature_id AS id
    - tags['name'] AS name
    - tags['name:en'] AS name_en
    - tags['place'] AS place
    - tags['landuse'] AS landuse
    - tags['population'] AS population
    - tags['is_in'] AS is_in
    - tags['source'] AS source
    where: []
    filter:
      place:
      - isolated_dwelling
      - town
      - village
      - hamlet
      - city
      landuse:
      - residential
  transliterate:
  - target: name_latin
    source: name
    prefer: name_en
  temporal:
    column: update_time
source: osm
